<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yasmin Clinica</title>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


    <!-- CSS -->
    <link rel="stylesheet" href="css/estilo.css">

</head>

<body>
    <!-- ALT + SHIFT + A -->

    <!-- Cabeçalho -->
    <header>

        <!-- Logo -->
        <div class="header-logo">
            <a href="#home">
                Yasmin Clinica
            </a>
        </div>

        <!-- Menu Desktop / PC -->
        <nav class="menu-desktop">
            <ul class="menu">
                <li>
                    <!-- Cria Links -->
                       <a href="#home" class="menu-link active">
                        <span class="menu-texto"> Home </span>
                    </a>
                </li>

                <li>
                    <a href="#Consultas" class="menu-link">
                        <span class="menu-texto"> Consultas </span>

                        
                    </a>
                </li>

                <li>
                    <a href="#sobre"class="menu-link">
                        <span class="menu-texto" >Sobre</span>
                    </a>
                </li>

                <li>
                    <a href="#contato" class="menu-link">
                        <span class="menu-texto" >Contato</span>
                    </a>
                </li>

            </ul>
        </nav>

        <!-- Icone Sol ou Lua Trocar Tema-->
        <div class="header-toggle">

            <i class="bi bi-sun" id="toggleTheme"></i>



            <!-- Botão Hamburger -->
            <button class="btn-menu-mobile" id="menuHamburger">
                <i class="bi bi-list"></i>
            </button>
        </div>




</body>

</html>
